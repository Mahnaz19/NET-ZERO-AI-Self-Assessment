name: CI

on:
  push:
    branches:
      - main
      - backend-skeleton
      - feature/frontend-questionnaire
  pull_request:

jobs:
  backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r scripts/requirements-dev.txt

      - name: Run backend app tests
        run: |
          cd backend
          pytest -q app/tests

      - name: Run RAG unit tests
        env:
          SKIP_HEAVY_RAG_TESTS: "1"
        run: |
          cd backend
          pytest -q tests/test_retriever.py tests/test_rag_embeddings.py

      - name: Run script tests (ingest RAG smoke)
        run: |
          PYTHONPATH=backend pytest scripts/tests/test_ingest_rag.py -q

  frontend:
    name: Frontend unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: backend
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:unit