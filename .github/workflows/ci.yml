name: CI

on:
  push:
    branches:
      - main
      - backend-skeleton
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r scripts/requirements-dev.txt

      - name: Run backend app tests
        run: |
          cd backend
          pytest -q app/tests

      - name: Run RAG unit tests
        env:
          SKIP_HEAVY_RAG_TESTS: "1"
        run: |
          cd backend
          pytest -q tests/test_retriever.py tests/test_rag_embeddings.py

      - name: Run script tests (ingest RAG smoke)
        run: |
          PYTHONPATH=backend pytest scripts/tests/test_ingest_rag.py -q

